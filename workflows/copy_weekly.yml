name: Create Weekly HTML File

on:
  schedule:
    # Runs at 02:00 every Sunday
    - cron: '0 2 * * 0'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  copy-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate next week filename and copy
        run: |
          # 1. Navigate to the directory
          cd docs/weeks/
          
          # 2. Find the most recent file based on naming convention
          LATEST_FILE=$(ls 20*-W*.html | sort -V | tail -n 1)
          echo "Latest file found: $LATEST_FILE"

          # 3. Calculate the date for the upcoming Monday (ISO Week)
          # We use +1 day because the script runs Sunday; Monday is the start of the next ISO week.
          NEXT_WEEK=$(date -d "+1 day" +%G-W%V)
          NEW_FILE="${NEXT_WEEK}.html"
          
          echo "Target filename: $NEW_FILE"

          # 4. Copy if it doesn't already exist
          if [ -f "$NEW_FILE" ]; then
            echo "File $NEW_FILE already exists. Skipping."
          else
            cp "$LATEST_FILE" "$NEW_FILE"
            echo "Successfully created $NEW_FILE"
          fi

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/weeks/*.html
          
          # Only commit if there are changes to avoid errors
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated: Created weekly file for $(date -d "+1 day" +%G-W%V)"
            git push
          fi
